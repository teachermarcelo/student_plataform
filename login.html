<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | English Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module">
    import { auth } from './js/auth.js'

    // Verificar se já está logado
    window.addEventListener('DOMContentLoaded', async () => {
      const session = await auth.getSession()
      if (session) {
        window.location.href = '/index.html'
      }
    })

    // Login form
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      
      try {
        await auth.signIn(email, password)
        window.location.href = '/index.html'
      } catch (error) {
        document.getElementById('errorMsg').textContent = 'Email ou senha inválidos'
        document.getElementById('errorMsg').classList.remove('hidden')
      }
    })
  </script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full mx-4">
    <div class="bg-white rounded-2xl shadow-xl p-8">
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-brand-100 mb-4">
          <svg class="w-8 h-8 text-brand-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-slate-900">English Platform</h1>
        <p class="text-slate-500 mt-2">Acesse sua conta para continuar</p>
      </div>

      <div id="errorMsg" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg mb-4 text-sm"></div>

      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
          <input type="email" id="email" required 
            class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Senha</label>
          <input type="password" id="password" required 
            class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition">
        </div>
        <button type="submit" 
          class="w-full bg-brand-600 text-white py-2.5 rounded-lg font-medium hover:bg-brand-700 transition">
          Entrar
        </button>
      </form>

      <div class="mt-6 text-center text-sm text-slate-500">
        <p>Não tem uma conta? <a href="#" class="text-brand-600 hover:underline">Solicite acesso</a></p>
      </div>
    </div>
  </div>
</body>
</html>
